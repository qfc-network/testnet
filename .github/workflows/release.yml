name: Build & Release qfc-miner

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            features: coreml
            artifact: qfc-macos-arm64
          - name: macOS Intel
            os: macos-15
            target: x86_64-apple-darwin
            features: candle
            artifact: qfc-macos-intel
          - name: Linux x86_64 CPU
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            features: candle
            artifact: qfc-linux-x86_64
          - name: Linux ARM64 CPU
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            features: candle
            artifact: qfc-linux-arm64
          - name: Linux x86_64 OpenCL
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            features: opencl,candle
            artifact: qfc-linux-x86_64-opencl
          - name: Windows x86_64 CPU
            os: windows-2022
            target: x86_64-pc-windows-msvc
            features: candle
            artifact: qfc-windows-x86_64
          - name: Windows x86_64 CUDA
            os: windows-2022
            target: x86_64-pc-windows-msvc
            features: cuda,candle
            artifact: qfc-windows-x86_64-cuda

    continue-on-error: ${{ contains(matrix.features, 'cuda') }}

    steps:
      - name: Checkout qfc-miner repo
        uses: actions/checkout@v4

      - name: Checkout qfc-core (source)
        uses: actions/checkout@v4
        with:
          repository: qfc-network/qfc-core
          ref: main
          path: qfc-core

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: qfc-core

      - name: Install CUDA Toolkit
        if: contains(matrix.features, 'cuda')
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.6.0'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "cusolver", "cusolver_dev", "curand", "curand_dev"]'

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Build qfc-miner
        working-directory: qfc-core
        shell: bash
        env:
          CUDA_COMPUTE_CAP: ${{ contains(matrix.features, 'cuda') && '89' || '' }}
        run: |
          cargo build --release \
            --features "${{ matrix.features }}" \
            --bin qfc-miner \
            --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp qfc-core/target/${{ matrix.target }}/release/qfc-miner dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz qfc-miner
          cd ..
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "qfc-core\target\${{ matrix.target }}\release\qfc-miner.exe" dist\
          Compress-Archive -Path dist\qfc-miner.exe -DestinationPath "${{ matrix.artifact }}.zip"
          $hash = (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Set-Content "${{ matrix.artifact }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qfc-*.tar.gz
            qfc-*.tar.gz.sha256
            qfc-*.zip
            qfc-*.zip.sha256
          generate_release_notes: true
          body: |
            ## QFC Inference Miner

            Download the binary for your platform and run:

            **macOS / Linux:**
            ```bash
            curl -sLO https://raw.githubusercontent.com/qfc-network/qfc-miner/main/scripts/start-miner.sh
            chmod +x start-miner.sh && ./start-miner.sh
            ```

            **Windows (PowerShell):**
            ```powershell
            iwr https://raw.githubusercontent.com/qfc-network/qfc-miner/main/scripts/install.ps1 | iex
            ```

            ### Platform Binaries
            | Platform | File | GPU Support |
            |----------|------|-------------|
            | macOS Apple Silicon | `qfc-macos-arm64.tar.gz` | Metal ✅ |
            | macOS Intel | `qfc-macos-intel.tar.gz` | CPU |
            | Linux x86_64 | `qfc-linux-x86_64.tar.gz` | CPU |
            | Linux x86_64 OpenCL | `qfc-linux-x86_64-opencl.tar.gz` | AMD/Intel GPU (OpenCL) |
            | Linux ARM64 | `qfc-linux-arm64.tar.gz` | CPU |
            | Windows x86_64 | `qfc-windows-x86_64.zip` | CPU |
            | Windows x86_64 CUDA | `qfc-windows-x86_64-cuda.zip` | CUDA ✅ |
